<html>

<head>
    <title>emcJS sandbox</title>
    <meta charset="UTF-8">
    <meta name="description" content="Test for emcJS components">
    <meta name="robots" content="none">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#000000">
    <style>
        :root {
            font-family: Arial, Helvetica, sans-serif;
            font-size: 16px;
        }

        * {
            font-family: Arial, Helvetica, sans-serif;
        }
    </style>
    <script type="module">
        // utils
        import i18n from "/emcJS/util/I18n.js";
        import FileLoader from "/emcJS/util/file/FileLoader.js";
        import CustomActionRegistry from "/emcJS/data/registry/CustomActionRegistry.js";
        // form
        import FormBuilder from "/emcJS/util/form/FormBuilder.js";
        import FormContext from "/emcJS/util/form/FormContext.js";
        import "/emcJS/ui/form/FormContainer.js";
        import "/emcJS/ui/form/FormFieldset.js";
        import "/emcJS/ui/form/FormButtonRow.js";
        // custom
        import "/emcJS/ui/form/custom/SearchSelect.js";
        // buttons
        import "/emcJS/ui/form/button/ActionButton.js";
        import "/emcJS/ui/form/button/LinkButton.js";
        import "/emcJS/ui/form/button/SubmitButton.js";
        import "/emcJS/ui/form/button/ResetButton.js";
        // field input
        import "/emcJS/ui/form/field/input/StringInput.js";
        import "/emcJS/ui/form/field/input/NumberInput.js";
        import "/emcJS/ui/form/field/input/PasswordInput.js";
        import "/emcJS/ui/form/field/input/ColorInput.js";
        import "/emcJS/ui/form/field/input/RangeInput.js";
        import "/emcJS/ui/form/field/input/HotkeyInput.js";
        import "/emcJS/ui/form/field/input/SwitchInput.js";
        // field select
        import "/emcJS/ui/form/field/select/SearchSelect.js";

        i18n.setTranslation("en", {
            "test.desc": "this is a test"
        })
        i18n.language = "en";

        const formConfig = await Promise.all([
            FileLoader.json("./form/form-config/SearchSelect.json"),
            FileLoader.json("./form/form-config/StringInput.json"),
            FileLoader.json("./form/form-config/NumberInput.json"),
            FileLoader.json("./form/form-config/RangeInput.json"),
            FileLoader.json("./form/form-config/PasswordInput.json"),
            FileLoader.json("./form/form-config/ColorInput.json"),
            FileLoader.json("./form/form-config/HotkeyInput.json"),
            FileLoader.json("./form/form-config/SwitchInput.json"),
            FileLoader.json("./form/form-config/Buttons.json")
        ]);

        const formEl = FormBuilder.build(formConfig, null, {
            submitButton: true,
            resetButton: true,
            allowsInvalid: true
        });
        document.body.append(formEl);

        const formEl2 = FormBuilder.build(formConfig[0], null, {
            submitButton: true,
            resetButton: true,
            allowsInvalid: true
        });
        document.body.append(formEl2);

        const formContext = new FormContext();
        formContext.registerForm(formEl);
        formContext.registerForm(formEl2);

        console.log("init data", formContext.getChanges());

        formEl.addEventListener("submit", (event) => {
            event.stopPropagation();
            event.preventDefault();
            if (formEl.checkValidity()) {
                console.log("changed data (valid)", formContext.getChanges());
            } else {
                console.log("changed data (invalid)", formContext.getChanges());
            }
        });

        formEl2.addEventListener("submit", (event) => {
            event.stopPropagation();
            event.preventDefault();
            if (formEl.checkValidity()) {
                console.log("changed data (valid)", formContext.getChanges());
            } else {
                console.log("changed data (invalid)", formContext.getChanges());
            }
        });

        CustomActionRegistry.set("soup", () => {
            alert("only soup");
        });

        CustomActionRegistry.set("cheese", () => {
            alert("more cheese");
            formContext.setData({
                "search-select.required": "foobar",
                "text.required": "nice",
                "number.required": 69,
                "password.required": "password",
                "color.default": "#ff0000",
                "color.resettable": "#00ff00",
                "color.required": "#0000ff",
                "hotkey.default": "Ctrl + W",
                "hotkey.resettable": "Ctrl + A",
                "hotkey.required": "Ctrl + S",
                "hotkey.readonly": "Ctrl + D",
                "switch.required": true
            });
        });
    </script>
</head>

<body style="display: flex; flex-direction: column;">
</body>

</html>
