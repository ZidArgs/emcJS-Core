<html>

<head>
    <title>emcJS sandbox</title>
    <meta charset="UTF-8">
    <meta name="description" content="Test for emcJS components">
    <meta name="robots" content="none">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#000000">
    <style>
        :root {
            font-family: Arial, Helvetica, sans-serif;
            font-size: 16px;
        }
    </style>
    <script type="module">
        import "/emcJS/ui/form/FormContainer.js";
        import "/emcJS/ui/form/FormField.js";
        import "/emcJS/ui/form/FormButtonRow.js";
        // buttons
        import "/emcJS/ui/form/button/ActionButton.js";
        import "/emcJS/ui/form/button/LinkButton.js";
        import "/emcJS/ui/form/button/SubmitButton.js";
        import "/emcJS/ui/form/button/ResetButton.js";
        // inputs
        import "/emcJS/ui/form/input/StringInput.js";
        import "/emcJS/ui/form/input/NumberInput.js";
        import "/emcJS/ui/form/input/PasswordInput.js";
        import i18n from "/emcJS/util/I18n.js";

        i18n.setTranslation("en", {
            "test.desc": "this is a test"
        })
        i18n.language = "en";
    </script>
</head>

<body style="display: flex; flex-direction: column;">
    <form is="emc-form" id="form-0">

        <emc-form-field label="text" desc="test.desc">
            <emc-input-string name="test.0" value="test"></emc-input-string>
        </emc-form-field>

        <emc-form-field label="text resettable">
            <emc-input-string name="test.1" value="test3" required resettable
                placeholder="your message..."></emc-input-string>
        </emc-form-field>

        <emc-form-field label="number">
            <emc-input-number name="test.2" value="42"></emc-input-number>
        </emc-form-field>

        <emc-form-field label="password">
            <emc-input-password name="test.3" value="" required placeholder="Enter password..."></emc-input-password>
        </emc-form-field>

        <emc-form-field label="password resettable">
            <emc-input-password name="test.4" value="" resettable disabled
                placeholder="Enter password..."></emc-input-password>
        </emc-form-field>

        <emc-form-button-row>
            <emc-button-link name="test.link" value="hotdog" icon="🌭" href="/#page=Input"></emc-button-link>
            <emc-button-action name="test.action" value="cheese" onclick="alert('more cheese')"
                icon="🧀"></emc-button-action>
            <emc-button-reset name="test.reset"></emc-button-reset>
            <emc-button-submit name="test.submit"></emc-button-submit>
        </emc-form-button-row>

    </form>
</body>

</html>
