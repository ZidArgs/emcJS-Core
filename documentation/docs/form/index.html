<html>

<head>
    <title>emcJS sandbox</title>
    <meta charset="UTF-8">
    <meta name="description" content="Test for emcJS components">
    <meta name="robots" content="none">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#000000">
    <style>
        :root {
            font-family: Arial, Helvetica, sans-serif;
            font-size: 16px;
        }

        #form-0 {
            background-color: var(--form-back-color, #ffffff);
        }
    </style>
    <script type="module">
        import "/emcJS/ui/form/FormContainer.js";
        import "/emcJS/ui/form/FormField.js";
        import "/emcJS/ui/form/FormFieldset.js";
        import "/emcJS/ui/form/FormButtonRow.js";
        // buttons
        import "/emcJS/ui/form/button/ActionButton.js";
        import "/emcJS/ui/form/button/LinkButton.js";
        import "/emcJS/ui/form/button/SubmitButton.js";
        import "/emcJS/ui/form/button/ResetButton.js";
        // inputs
        import "/emcJS/ui/form/input/StringInput.js";
        import "/emcJS/ui/form/input/NumberInput.js";
        import "/emcJS/ui/form/input/PasswordInput.js";
        import "/emcJS/ui/form/input/ColorInput.js";
        import "/emcJS/ui/form/input/RangeInput.js";
        import i18n from "/emcJS/util/I18n.js";

        i18n.setTranslation("en", {
            "test.desc": "this is a test"
        })
        i18n.language = "en";
    </script>
</head>

<body style="display: flex; flex-direction: column;">
    <form is="emc-form" id="form-0">

        <!-- text inputs -->

        <emc-form-fieldset label="text" desc="test.desc">

            <emc-form-field label="text default" desc="test.desc">
                <emc-input-string name="text.default" value="this is a text" placeholder="Enter text..."></emc-input-string>
            </emc-form-field>

            <emc-form-field label="text resettable">
                <emc-input-string name="text.resettable" value="" resettable placeholder="Enter text..."></emc-input-string>
            </emc-form-field>

            <emc-form-field label="text required">
                <emc-input-string name="text.required" value="" required placeholder="Enter text..."></emc-input-string>
            </emc-form-field>

            <emc-form-field label="text disabled">
                <emc-input-string name="text.disabled" value="" disabled placeholder="Enter text..."></emc-input-string>
            </emc-form-field>

            <emc-form-field label="text resettable disabled">
                <emc-input-string name="text.resettable_disabled" value="" resettable disabled placeholder="Enter text..."></emc-input-string>
            </emc-form-field>

        </emc-form-fieldset>

        <!-- number inputs -->

        <emc-form-fieldset label="number">

            <emc-form-field label="number default">
                <emc-input-number name="number.default" value="42" placeholder="Enter number..."></emc-input-number>
            </emc-form-field>

            <emc-form-field label="number resettable">
                <emc-input-number name="number.resettable" value="" resettable placeholder="Enter number..."></emc-input-number>
            </emc-form-field>

            <emc-form-field label="number required">
                <emc-input-number name="number.required" value="" required placeholder="Enter number..."></emc-input-number>
            </emc-form-field>

            <emc-form-field label="number disabled">
                <emc-input-number name="number.disabled" value="" disabled placeholder="Enter number..."></emc-input-number>
            </emc-form-field>

            <emc-form-field label="number resettable disabled">
                <emc-input-number name="number.resettable_disabled" value="" resettable disabled placeholder="Enter number..."></emc-input-number>
            </emc-form-field>

        </emc-form-fieldset>

        <!-- password inputs -->

        <emc-form-fieldset label="password">

            <emc-form-field label="password default">
                <emc-input-password name="password.default" value="password" placeholder="Enter password..."></emc-input-password>
            </emc-form-field>

            <emc-form-field label="password resettable">
                <emc-input-password name="password.resettable" value="" resettable placeholder="Enter password..."></emc-input-password>
            </emc-form-field>

            <emc-form-field label="password required">
                <emc-input-password name="password.required" value="" required placeholder="Enter password..."></emc-input-password>
            </emc-form-field>

            <emc-form-field label="password disabled">
                <emc-input-password name="password.disabled" value="" disabled placeholder="Enter password..."></emc-input-password>
            </emc-form-field>

            <emc-form-field label="password resettable disabled">
                <emc-input-password name="password.resettable_disabled" value="" resettable disabled placeholder="Enter password..."></emc-input-password>
            </emc-form-field>

        </emc-form-fieldset>

        <!-- color inputs -->

        <emc-form-fieldset label="color">

            <emc-form-field label="color default">
                <emc-input-color name="color.default" value="#ff0000" placeholder="Choose color..."></emc-input-color>
            </emc-form-field>

            <emc-form-field label="color resettable">
                <emc-input-color name="color.resettable" value="" resettable placeholder="Choose color..."></emc-input-color>
            </emc-form-field>

            <emc-form-field label="color required">
                <emc-input-color name="color.required" value="" required placeholder="Choose color..."></emc-input-color>
            </emc-form-field>

            <emc-form-field label="color disabled">
                <emc-input-color name="color.disabled" value="" disabled placeholder="Choose color..."></emc-input-color>
            </emc-form-field>

            <emc-form-field label="color resettable disabled">
                <emc-input-color name="color.resettable_disabled" value="" resettable disabled placeholder="Choose color..."></emc-input-color>
            </emc-form-field>

        </emc-form-fieldset>

        <!-- range inputs -->

        <emc-form-fieldset label="range">

            <emc-form-field label="range default">
                <emc-input-range name="range.default" value="4"></emc-input-range>
            </emc-form-field>

            <emc-form-field label="range scratched">
                <emc-input-range name="range.scratched" value="4" scratch></emc-input-range>
            </emc-form-field>

            <emc-form-field label="range resettable">
                <emc-input-range name="range.resettable" value="" min="-20" max="20" resettable></emc-input-range>
            </emc-form-field>

            <emc-form-field label="range disabled">
                <emc-input-range name="range.disabled" value="" disabled></emc-input-range>
            </emc-form-field>

            <emc-form-field label="range resettable disabled">
                <emc-input-range name="range.resettable_disabled" value="" resettable disabled></emc-input-range>
            </emc-form-field>

        </emc-form-fieldset>

        <!-- buttons -->

        <emc-form-button-row>
            <emc-button-link name="button.link_disabled" value="cookie" icon="🍪" href="/#page=Input" disabled></emc-button-link>
            <emc-button-link name="button.link" value="hotdog" icon="🌭" href="/#page=Input"></emc-button-link>
            <emc-button-action name="button.action_disabled" value="soup" onclick="alert('only soup')" icon="🍲" disabled></emc-button-action>
            <emc-button-action name="button.action" value="cheese" onclick="alert('more cheese')" icon="🧀"></emc-button-action>
            <emc-button-reset name="button.reset"></emc-button-reset>
            <emc-button-submit name="button.submit"></emc-button-submit>
        </emc-form-button-row>

    </form>
</body>

</html>
