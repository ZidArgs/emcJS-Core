<html>

<head>
    <title>emcJS sandbox</title>
    <meta charset="UTF-8">
    <meta name="description" content="Test for emcJS components">
    <meta name="robots" content="none">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#000000">
    <style>
        :root {
            font-family: Arial, Helvetica, sans-serif;
            font-size: 16px;
        }

        * {
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            margin: 0px;
            padding: 0px;
        }
    </style>
    <script type="module">
        // main
        import i18n from "/emcJS/util/I18n.js";
        import FileLoader from "/emcJS/util/file/FileLoader.js";
        import CustomActionRegistry from "/emcJS/data/registry/CustomActionRegistry.js";
        import "/emcJS/ui/Page.js";
        // form
        import FormBuilder from "/emcJS/util/form/FormBuilder.js";
        import FormContext from "/emcJS/util/form/FormContext.js";
        import "/emcJS/ui/form/FormContainer.js";
        import "/emcJS/ui/form/FormFieldset.js";
        import "/emcJS/ui/form/FormButtonRow.js";
        import "/emcJS/ui/form/button/SubmitButton.js";
        import "/emcJS/ui/form/button/ResetButton.js";
        import "/emcJS/ui/form/button/ActionButton.js";
        import "/emcJS/ui/form/button/LinkButton.js";
        import "/emcJS/ui/form/field/DefaultFormFieldsLoader.js";

        /*
               NOW          :    BEFORE
            "Fieldset"      : new (structural only)
            "ButtonRow"     : new (structural only)
            "SubmitButton"  : new
            "ResetButton"   : new
            "ActionButton"  : "button"
            "LinkButton"    : new
            "SwitchInput"   : "check"
            "StringInput"   : "string"
            "NumberInput"   : "number"
            "RangeInput"    : "range"
            "ColorInput"    : "color"
            "PasswordInput" : "password"
            "HotkeyInput"   : "hotkey"
            "TextInput"     : new
            "LogicInput"    : new
            "SearchSelect"  : "choice"
            "SimpleSelect"  : new
            todo            : "list"

            MISSING
            "KeyValueList"
            "CharInput"
            "FileInput"

        */

        i18n.setTranslation("en", {
            "test.desc": "this is a test"
        })
        i18n.language = "en";

        const [defaultValues, buttonConfig, ...formConfig] = await Promise.all([
            FileLoader.json("./form/form-config/_defaults.json"),
            FileLoader.json("./form/form-config/Buttons.json"),
            FileLoader.json("./form/form-config/input/LogicInput.json"),
            FileLoader.json("./form/form-config/select/SearchSelect.json"),
            FileLoader.json("./form/form-config/select/SimpleSelect.json"),
            FileLoader.json("./form/form-config/input/TextInput.json"),
            FileLoader.json("./form/form-config/input/StringInput.json"),
            FileLoader.json("./form/form-config/input/NumberInput.json"),
            FileLoader.json("./form/form-config/input/RangeInput.json"),
            FileLoader.json("./form/form-config/input/PasswordInput.json"),
            FileLoader.json("./form/form-config/input/ColorInput.json"),
            FileLoader.json("./form/form-config/input/HotkeyInput.json"),
            FileLoader.json("./form/form-config/input/SwitchInput.json")
        ]);

        const pageEl = document.getElementById("page");

        const formContext = new FormContext(defaultValues);

        const config = [];

        /* add buttons in seperate form */
        config.push({
            params: {
                values: {
                    test: "foobar"
                },
                allowsInvalid: true,
                type: "header",
                contentMask: "8px"
            },
            elements: buttonConfig
        });

        for (const elements of formConfig) {
            config.push({
                params: {
                    allowsInvalid: true
                },
                elements
            });
        }

        /* add seperate submit */
        config.push({
            params: {
                submitButton: true,
                resetButton: true,
                allowsInvalid: true,
                type: "footer",
                contentMask: "8px"
            }
        });

        pageEl.append(FormBuilder.build(config));

        console.group("init context");
        console.log("loaded data", defaultValues);
        console.log("changed data", formContext.getChanges());
        console.groupEnd("init context");

        formContext.addEventListener("submit", () => {
            const valid = formContext.getFormValidity() ? "valid" : "invalid";
            console.group(`submit (${valid})`);
            console.log("changed data", formContext.getChanges());
            console.log("all data", formContext.getData());
            console.log("form data", formContext.getFormData());
            console.log("hidden form data", formContext.getHiddenFormData());
            console.groupEnd(`submit (${valid})`);
        });

        CustomActionRegistry.current.set("soup", () => {
            alert("only soup");
        });

        CustomActionRegistry.current.set("cheese", () => {
            alert("more cheese");
            formContext.loadData({
                "search-select.required": "foobar",
                "text.required": "nice",
                "number.required": 69,
                "password.required": "password",
                "color.default": "#ff0000",
                "color.resettable": "#00ff00",
                "color.required": "#0000ff",
                "hotkey.default": "ctrl w",
                "hotkey.resettable": "ctrl a",
                "hotkey.required": "ctrl s",
                "hotkey.readonly": "ctrl d",
                "switch.required": true
            });
        });
    </script>
</head>

<body style="display: flex; flex-direction: column;">
    <emc-page id="page" style="padding: 8px;">
    </emc-page>
</body>

</html>
