<html>

<head>
    <title>emcJS sandbox</title>
    <meta charset="UTF-8">
    <meta name="description" content="Test for emcJS components">
    <meta name="robots" content="none">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#000000">
    <script type="module">
        import "/emcJS/ui/form/FormContainer.js";
        import "/emcJS/ui/form/FormField.js";
        import "/emcJS/ui/form/field/input/StringInput.js";
        import "/emcJS/ui/form/field/input/NumberInput.js";
        import "/emcJS/ui/form/field/input/PasswordInput.js";
        import i18n from "/emcJS/util/I18n.js";

        i18n.setTranslation("en", {
            "test.desc": "this is a test"
        })
        i18n.language = "en"
    </script>
</head>

<body style="display: flex; flex-direction: column;">
    <emc-form>

        <emc-form-field label="text" desc="test.desc">
            <emc-input-string key="test.0" value="test"></emc-input-string>
        </emc-form-field>

        <emc-form-field label="text resettable">
            <emc-input-string key="test.1" value="test3" resettable></emc-input-string>
        </emc-form-field>

        <emc-form-field label="number">
            <emc-input-number key="test.2" value="42"></emc-input-number>
        </emc-form-field>

        <emc-form-field label="password">
            <emc-input-password key="test.3" value=""></emc-input-password>
        </emc-form-field>

        <emc-form-field label="password resettable">
            <emc-input-password key="test.4" value="" resettable></emc-input-password>
        </emc-form-field>

    </emc-form>
</body>

</html>
