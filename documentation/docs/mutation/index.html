<html>

<head>
    <title>emcJS sandbox</title>
    <meta charset="UTF-8">
    <meta name="description" content="Test for emcJS components">
    <meta name="robots" content="none">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#000000">
    <script src="/emcJS/polyfills/contextmenuEvent.polyfill.js"></script>
    <script type="module">
        import CustomElement from "/emcJS/ui/element/CustomElement.js";
        import ChildlistMutationObserverMixin from "/emcJS/ui/mixin/ChildlistMutationObserverMixin.js";
        import Template from "/emcJS/util/html/Template.js";
        const TPL = new Template(`
            <slot></slot>
        `);

        export default class MyContainer extends ChildlistMutationObserverMixin(CustomElement) {

            constructor() {
                super();
                this.shadowRoot.append(TPL.generate());
            }

            nodeAddedCallback(element) {
                console.log("add");
            }

            nodeRemovedCallback(element) {
                console.log("remove");
            }

        }

        customElements.define("my-container", MyContainer);

        const containerEl = document.getElementById("container");
        const addEl = document.getElementById("add");
        const removeEl = document.getElementById("remove");
        let cnt = 0;
        addEl.addEventListener("click", () => {
            const el = document.createElement("div");
            el.innerHTML = "div" + (cnt++)
            containerEl.append(el);
        });
        removeEl.addEventListener("click", () => {
            const el = containerEl.querySelector("*");
            el?.remove();
        });
    </script>
</head>

<body style="display: flex; flex-direction: column;">
    <input type="button" id="add" value="Add">
    <input type="button" id="remove" value="Remove">
    <my-container id="container"></my-container>
</body>

</html>
