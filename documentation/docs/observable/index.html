<html>

<head>
    <title>emcJS sandbox</title>
    <meta charset="UTF-8">
    <meta name="description" content="Test for emcJS components">
    <meta name="robots" content="none">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#000000">
    <script type="module">
        import Observable from "/emcJS/data/Observable.js";
        import "/emcJS/ui/input/InputWrapper.js";

        // partial change
        const partObservable = new Observable({});

        const partKeyInput = document.getElementById("partKeyInput");
        const partValueInput = document.getElementById("partValueInput");
        const partChangeObservable = document.getElementById("partChangeObservable");
        const partValueOutput = document.getElementById("partValueOutput");

        partChangeObservable.addEventListener("click", () => {
            const key = partKeyInput.value;
            const value = partValueInput.value;
            partObservable[key] = value;
        });

        partObservable.addEventListener("change", (event) => {
            partValueOutput.value = `change:\n\n${JSON.stringify(event.data, null, 4)}\n\nvalue:\n\n${JSON.stringify(partObservable, null, 4)}`;
        });
    </script>
</head>

<body style="display: flex; flex-direction: column;">
    <emc-input-wrapper>
        <input type="text" id="partKeyInput">
    </emc-input-wrapper>
    <emc-input-wrapper>
        <textarea id="partValueInput"></textarea>
    </emc-input-wrapper>
    <emc-input-wrapper>
        <input type="button" id="partChangeObservable" value="Write">
    </emc-input-wrapper>
    <emc-input-wrapper>
        <textarea id="partValueOutput">{}</textarea>
    </emc-input-wrapper>
</body>

</html>
