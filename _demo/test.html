<html>
    <head>
        <title>emcJS sandbox</title>
        <base href="/_demo/">
        <meta charset="UTF-8">
        <meta name="description" content="Test for emcJS components">
        <meta name="robots" content="none">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
        <meta name="theme-color" content="#000000">
        <style>
            .container {
                position: relative;
                width: 200px;
                height: 200px;
                overflow: auto;
            }
            .container > * {
                position: relative;
            }
            .container > *:after {
                position: absolute;
                display: block;
                left: 0;
                top: 0;
                right: 0;
                bottom: 0;
                pointer-events: none;
                content: "";
            }
            .container[data-scroll-x="0"] > *:after {
                background-image:
                    linear-gradient(90deg, #000 0px, #0000 var(--scroll-shadow-width, 10px));
            }
            .container[data-scroll-x="100"] > *:after {
                background-image:
                    linear-gradient(270deg, #000 0px, #0000 var(--scroll-shadow-width, 10px));
            }
            .container[data-scroll-y="0"] > *:after {
                background-image:
                    linear-gradient(180deg, #000 0px, #0000 var(--scroll-shadow-width, 10px));
            }
            .container[data-scroll-y="100"] > *:after {
                background-image:
                    linear-gradient(0deg, #000 0px, #0000 var(--scroll-shadow-width, 10px));
            }
            .container[data-scroll-x="0"][data-scroll-y="0"] > *:after {
                background-image:
                    linear-gradient(90deg, #000 0px, #0000 var(--scroll-shadow-width, 10px)),
                    linear-gradient(180deg, #000 0px, #0000 var(--scroll-shadow-width, 10px));
            }
            .container[data-scroll-x="100"][data-scroll-y="0"] > *:after {
                background-image:
                    linear-gradient(270deg, #000 0px, #0000 var(--scroll-shadow-width, 10px)),
                    linear-gradient(180deg, #000 0px, #0000 var(--scroll-shadow-width, 10px));
            }
            .container[data-scroll-x="100"][data-scroll-y="100"] > *:after {
                background-image:
                    linear-gradient(270deg, #000 0px, #0000 var(--scroll-shadow-width, 10px)),
                    linear-gradient(0deg, #000 0px, #0000 var(--scroll-shadow-width, 10px));
            }
            .container[data-scroll-x="0"][data-scroll-y="100"] > *:after {
                background-image:
                    linear-gradient(90deg, #000 0px, #0000 var(--scroll-shadow-width, 10px)),
                    linear-gradient(0deg, #000 0px, #0000 var(--scroll-shadow-width, 10px));
            }
            .content {
                display: grid;
                grid-template-rows: 1fr 1fr;
                grid-template-columns: 1fr 1fr;
                width: 150%;
                height: 150%;
            }
            .element {
                margin: 10px;
            }
            .blue {
                background-color: blue;
            }
            .green {
                background-color: green;
            }
            .red {
                background-color: red;
            }
            .yellow {
                background-color: yellow;
            }
        </style>
        <script type="module">
            const debounce = (fn) => {
                let frame;
                return (...params) => {
                    if (frame) { 
                        cancelAnimationFrame(frame);
                    }
                    frame = requestAnimationFrame(() => {
                        fn(...params);
                    });

                } 
            };

            const element = document.getElementById("cnt0");

            // Reads out the scroll position and stores it in the data attribute
            // so we can use it in our stylesheets
            const storeScroll = () => {
                const sw = element.scrollWidth;
                const sh = element.scrollHeight;
                const sl = element.scrollLeft;
                const st = element.scrollTop;
                const cw = element.clientWidth;
                const ch = element.clientHeight;
                if (sw > cw) {
                    element.dataset.scrollX = parseInt(sl / (sw - cw) * 100);
                } else {
                    element.dataset.scrollX = "";
                }
                if (sh > ch) {
                    element.dataset.scrollY = parseInt(st / (sh - ch) * 100);
                } else {
                    element.dataset.scrollY = "";
                }
            }

            // Listen for new scroll events, here we debounce our `storeScroll` function
            element.addEventListener('scroll', debounce(storeScroll), { passive: true });

            // Update scroll position for first time
            storeScroll();
        </script>
    </head>
    <body>
        <div class="container">
            <div class="content">
                <div class="element blue"></div>
                <div class="element green"></div>
                <div class="element red"></div>
                <div class="element yellow"></div>
            </div>
        </div>
        <div id="cnt0" class="container">
            <ul>
                <li>I Show Below Shadow. Go Down Now</li>
                <li>1</li>
                <li>2</li>
                <li>3</li>
                <li>4</li>
                <li>5</li>
                <li>6</li>
                <li>7</li>
                <li>8</li>
                <li>9</li>
                <li>10</li>
                <li>11</li>
                <li>12</li>
                <li>13</li>
                <li>14</li>
                <li>15</li>
                <li>16</li>
                <li>17</li>
                <li>18</li>
                <li>19</li>
                <li>20</li>
                <li>The end!</li>
                <li>No shadow here. See Above. Go Up</li>
              </ul>
        </div>
    </body>
</html>
