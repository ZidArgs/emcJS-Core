<html>
    <head>
        <title>emcJS sandbox</title>
        <base href="/_demo/custom_element/">
        <meta charset="UTF-8">
        <meta name="description" content="Test for emcJS components">
        <meta name="robots" content="none">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
        <meta name="theme-color" content="#000000">
        <script type="module">
            import Template from "../../src/util/html/Template.js";
            import GlobalStyle from "../../src/util/html/GlobalStyle.js";
            import MessageLayer from "../../src/ui/overlay/message/MessageLayer.js";
            import CustomElement from "../../src/ui/CustomElement.js";

            const STYLE = new GlobalStyle(`
                :host {
                    display: inline-block;
                    width: 20px;
                    height: 20px;
                    background-color: blue;
                }
                div {
                    width: 50%;
                    height: 100%;
                    background-color: red;
                }
            `);

            const TPL = new Template(`
                <div>
                </div>
            `);

            class Test extends CustomElement {

                constructor() {
                    super();
                    this.shadowRoot.append(TPL.generate());
                    STYLE.apply(this.shadowRoot);
                }

            }

            customElements.define('emc-test', Test);

            
            /* --- */
            const MessageLayerEl = new MessageLayer();
            document.body.append(MessageLayerEl);
            /* --- */
            const testEl = document.getElementById("test");
            testEl.addEventListener("click", () => {
                MessageLayerEl.createMessage("foobar", () => {
                    console.log("click success");
                });
                MessageLayerEl.createErrorMessage("error", () => {
                    console.log("click success");
                });
                /* --- */
                MessageLayerEl.createToast("foobar", 5);
                MessageLayerEl.createInfoToast("info", 5);
                MessageLayerEl.createSuccessToast("success", 5);
                MessageLayerEl.createWarnToast("warning", 5);
                MessageLayerEl.createErrorToast("error", 5);
                /* --- */
                MessageLayerEl.createPopOver("foobar", 20, () => {
                    console.log("click success");
                });
            });

        </script>
    </head>
    <body>
        <emc-test id="test"></emc-test>
    </body>
</html>
