<!DOCTYPE html>
<html lang="en">

<head>
    <title>emcJS sandbox</title>
    <meta charset="UTF-8">
    <meta name="description" content="Test for emcJS components">
    <meta name="robots" content="none">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#000000">
    <style>
        :root {
            font-family: Arial, Helvetica, sans-serif;
            font-size: 16px;
        }

        * {
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            margin: 0px;
            padding: 0px;
        }

        #page {
            box-sizing: border-box;
            height: 100vh;
        }
    </style>
    <script type="module" src="./index.js"></script>
</head>

<body style="display: flex; flex-direction: column;">
    <emc-page id="page" style="padding: 8px;">
        <emc-button id="prompt" text="prompt"></emc-button>
        <emc-button id="prompt-number" text="prompt number"></emc-button>
        <emc-button id="prompt-sensitive" text="prompt sensitive"></emc-button>
        <emc-button id="confirm" text="confirm"></emc-button>
        <emc-button id="info" text="info"></emc-button>
        <emc-button id="alert" text="alert"></emc-button>
        <emc-button id="error" text="error"></emc-button>
    </emc-page>
</body>

</html>
