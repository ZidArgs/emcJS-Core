<html lang="en">

<head>
    <title>emcJS sandbox</title>
    <meta charset="UTF-8">
    <meta name="description" content="Test for emcJS components">
    <meta name="robots" content="none">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#000000">
    <style>
        :root {
            font-family: Arial, Helvetica, sans-serif;
            font-size: 16px;
        }

        * {
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            margin: 0px;
            padding: 0px;
        }

        emc-form-container {
            height: 100%;
        }

        div.table {
            display: flex;
            flex-direction: column;
            min-height: 100px;
            min-width: 200px;
            height: 200px;
            width: 300px;
            margin: 8px;
            border: solid 2px black;
            overflow: auto;
            resize: both;
        }

        table {
            width: 100%;
            border-spacing: 0px;
        }

        table thead th {
            position: sticky;
            top: 0px;
            padding: 8px;
            color: white;
            background-color: black;
        }

        table thead th:not(:first-child) {
            border-left: solid 1px white;
        }

        table thead th:not(:last-child) {
            border-right: solid 1px white;
        }

        table thead th {
            min-width: 50px;
            padding: 8px;
            color: white;
            background-color: black;
        }

        table tbody tr:not(:last-child) {
            border-bottom: solid 2px black;
        }

        table td {
            padding: 8px;
        }

        #empty {
            position: sticky;
            display: flex;
            align-items: center;
            justify-content: center;
            flex: 1;
            left: 0px;
            min-height: 100px;
            min-width: 200px;
            width: inherit;
            min-height: 2rem;
            max-height: 200px;
            white-space: normal;
            font-style: italic;
        }
    </style>
</head>

<body style="display: flex; flex-direction: column;">
