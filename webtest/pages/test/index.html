<html lang="en">

<head>
    <title>emcJS sandbox</title>
    <meta charset="UTF-8">
    <meta name="description" content="Test for emcJS components">
    <meta name="robots" content="none">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#000000">
    <style>
        :root {
            font-family: Arial, Helvetica, sans-serif;
            font-size: 16px;
        }

        * {
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            margin: 0px;
            padding: 0px;
        }

        emc-form-container {
            height: 100%;
        }
    </style>
    <script type="module" src="./index.js"></script>
</head>

<body style="display: flex; flex-direction: column;">
    <emc-page id="page" style="padding: 8px;">
        <emc-grid-datagrid id="grida" style="resize: both;" selectable>
            <emc-grid-column name="A" label="" type="number" width="50"></emc-grid-column>
            <emc-grid-column name="B" label="Product" type="string" width="120"></emc-grid-column>
            <emc-grid-column name="C" label="Price" type="currency" decimals="2" postfix=" €" width="100" negative-color="red"></emc-grid-column>
            <emc-grid-column name="D" type="boolean"></emc-grid-column>
            <emc-grid-column name="-0-" type="empty" width="20"></emc-grid-column>
            <emc-grid-column name="E" label="Since" type="datetime" width="170"></emc-grid-column>
            <emc-grid-column name="-1-" type="empty" width="10"></emc-grid-column>
        </emc-grid-datagrid>
        <emc-grid-datagrid id="grid0" style="resize: both;" selectable>
            <emc-grid-column name="i18n" type="i18n" width="100"></emc-grid-column>
            <emc-grid-column name="A" label="" type="number" width="50"></emc-grid-column>
            <emc-grid-column name="B" label="Product" type="string" width="120"></emc-grid-column>
            <emc-grid-column name="C" label="Price" type="currency" decimals="2" postfix=" €" width="100" negative-color="red"></emc-grid-column>
            <emc-grid-column name="D" type="boolean"></emc-grid-column>
            <emc-grid-column name="E" label="Since" type="datetime" width="170"></emc-grid-column>
            <emc-grid-column name="-0-" type="image" editable optiongroup="ImageSelect" width="120"></emc-grid-column>
        </emc-grid-datagrid>
        <emc-grid-datagrid id="grid1" style="width: 1000px;" selectable>
            <emc-grid-column name="i18n" type="i18n" editable width="100"></emc-grid-column>
            <emc-grid-column name="A" label="" type="number" width="50"></emc-grid-column>
            <emc-grid-column name="B" label="Product" type="string" width="120"></emc-grid-column>
            <emc-grid-column name="C" label="Price" type="currency" decimals="2" postfix=" €" width="100" negative-color="red"></emc-grid-column>
            <emc-grid-column name="D" type="boolorlogic" editable></emc-grid-column>
            <emc-grid-column name="E" label="Since" type="datetime" width="170"></emc-grid-column>
        </emc-grid-datagrid>
        <emc-grid-datagrid id="grid2" style="width: 1000px;" nohead selectable>
            <emc-grid-column name="i18n" type="i18n" editable width="100"></emc-grid-column>
            <emc-grid-column name="A" label="" type="number" editable width="50"></emc-grid-column>
            <emc-grid-column name="B" label="Product" type="string" editable width="120"></emc-grid-column>
            <emc-grid-column name="C" label="Price" type="currency" decimals="2" postfix=" €" width="100" negative-color="red"></emc-grid-column>
            <emc-grid-column name="D" type="boolean" editable></emc-grid-column>
            <emc-grid-column name="E" label="Since" type="datetime" editable width="170"></emc-grid-column>
            <emc-grid-column name="F" label="Since" type="date" editable width="100"></emc-grid-column>
            <emc-grid-column name="G" label="Since" type="time" editable width="100"></emc-grid-column>
        </emc-grid-datagrid>
    </emc-page>
</body>

</html>
