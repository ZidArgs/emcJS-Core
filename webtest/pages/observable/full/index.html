<html>

<head>
    <title>emcJS sandbox</title>
    <meta charset="UTF-8">
    <meta name="description" content="Test for emcJS components">
    <meta name="robots" content="none">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#000000">
    <script type="module">
        import Observable from "/emcJS/data/Observable.js";
        import "/emcJS/ui/input/InputWrapper.js";

        // full change
        const fullObservable = new Observable({});

        const fullValueInput = document.getElementById("fullValueInput");
        const fullChangeObservable = document.getElementById("fullChangeObservable");
        const fullValueOutput = document.getElementById("fullValueOutput");

        function writeRecursive(obj, key, value) {
            const oldValue = obj[key];
            if (typeof oldValue === "object" && typeof value === "object") {
                for (const bKey in value) {
                    const bValue = value[bKey];
                    writeRecursive(oldValue, bKey, bValue);
                }
            } else {
                obj[key] = value;
            }
        }

        fullChangeObservable.addEventListener("click", () => {
            const values = JSON.parse(fullValueInput.value);
            for (const key in values) {
                const value = values[key];
                writeRecursive(fullObservable, key, value);
            }
        });

        fullObservable.addEventListener("change", (event) => {
            fullValueOutput.value = `change:\n\n${JSON.stringify(event.data, null, 4)}\n\nvalue:\n\n${JSON.stringify(fullObservable, null, 4)}`;
        });

        window.fullObservable = fullObservable;
    </script>
</head>

<body style="display: flex; flex-direction: column;">
    <emc-input-wrapper>
        <textarea id="fullValueInput">{}</textarea>
    </emc-input-wrapper>
    <emc-input-wrapper>
        <input type="button" id="fullChangeObservable" value="Write">
    </emc-input-wrapper>
    <emc-input-wrapper>
        <textarea id="fullValueOutput">{}</textarea>
    </emc-input-wrapper>
</body>

</html>
