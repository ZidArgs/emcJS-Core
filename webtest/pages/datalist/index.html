<!DOCTYPE html>
<html lang="en">

<head>
    <title>emcJS sandbox</title>
    <meta charset="UTF-8">
    <meta name="description" content="Test for emcJS components">
    <meta name="robots" content="none">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#000000">
    <style>
        :root {
            font-family: Arial, Helvetica, sans-serif;
            font-size: 16px;
        }

        * {
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            margin: 0px;
            padding: 0px;
        }

        emc-form-container {
            height: 100%;
        }
    </style>
    <script type="module" src="./index.js"></script>
</head>

<body style="display: flex; flex-direction: column;">
    <emc-page id="page" style="padding: 8px;">
        <emc-datalist id="list-a" style="resize: both;">
        </emc-datalist>

        <emc-datalist id="list-0" style="resize: both;">
        </emc-datalist>

        <emc-datalist id="list-1" style="width: 1000px;">
        </emc-datalist>

        <emc-datalist id="list-2" style="width: 1000px;">
        </emc-datalist>

        <emc-datalist id="list-remote-simple" style="width: 1000px; margin-bottom: 2px;">
        </emc-datalist>
        <emc-dataview-control-toolbar id="control-toolbar-simple" sizes="10,15,20,25,50,100" size="15" controls="pagination page-size total-count" style="width: 1000px; margin-top: 0px;"></emc-dataview-control-toolbar>

        <emc-datalist id="list-remote-large" style="width: 1000px; height: 400px; margin-bottom: 2px;">
        </emc-datalist>
        <emc-dataview-control-toolbar id="control-toolbar-large" sizes="10,15,20,25,50,100" size="15" controls="pagination page-size entries-count total-count" style="width: 1000px; margin-top: 0px;"></emc-dataview-control-toolbar>
    </emc-page>
</body>

</html>
