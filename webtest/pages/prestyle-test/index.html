<!DOCTYPE html>
<html lang="en">

<head>
    <title>emcJS sandbox</title>
    <meta charset="UTF-8">
    <meta name="description" content="Test for emcJS components">
    <meta name="robots" content="none">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#000000">
    <style>
        :root {
            font-family: Arial, Helvetica, sans-serif;
            font-size: 16px;
        }

        * {
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            margin: 0px;
            padding: 0px;
        }

        emc-form-container {
            height: 100%;
        }

        #load-button {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 150px;
            height: 30px;
            border-radius: 15px;
            white-space: nowrap;
            color: rgb(57, 0, 110);
            background-color: rgb(181, 115, 241);
            border-color: rgb(127, 30, 218);
            cursor: pointer;
        }

        #load-button:hover {
            color: rgb(181, 115, 241);
            background-color: rgb(57, 0, 110);
            border-color: rgb(57, 0, 110);
        }
    </style>
    <script type="module" src="./index.js"></script>
</head>

<body style="display: flex; flex-direction: column;">
    <button id="load-button">load components</button>

    <emc-navbar id="navbar"></emc-navbar>
    <emc-page id="page" style="padding: 8px;">

        <emc-datagrid id="grid-2" style="width: 1000px; height: 400px;" sortable selectable allowdeselect>
            <emc-datagrid-column name="i18n" type="i18n" editable width="100"></emc-datagrid-column>
            <emc-datagrid-column name="A" label="" type="number" editable width="100" fixed="start"></emc-datagrid-column>
            <emc-datagrid-column name="B" label="Product" type="string" editable width="200"></emc-datagrid-column>
            <emc-datagrid-column name="C" label="Price" type="currency" decimals="2" postfix=" €" width="100" negative-color="red"></emc-datagrid-column>
            <emc-datagrid-column name="D" type="boolean" editable width="70"></emc-datagrid-column>
            <emc-datagrid-column name="E" label="Since" type="datetime" editable width="300"></emc-datagrid-column>
            <emc-datagrid-column name="F" label="Since" type="date" editable width="200" fixed="end"></emc-datagrid-column>
            <emc-datagrid-column name="G" label="Since" type="time" editable width="200" fixed="end"></emc-datagrid-column>
        </emc-datagrid>
        <emc-dataview-control-toolbar id="control-toolbar-large" sizes="10,15,20,25,50,100" size="15" controls="pagination page-size entries-count total-count" style="width: 1000px; margin-top: 0px; margin-bottom: 30px;">
        </emc-dataview-control-toolbar>

        <emc-datalist id="list-a" style="resize: both;">
        </emc-datalist>

    </emc-page>
</body>

</html>
