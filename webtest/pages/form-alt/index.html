<!DOCTYPE html>
<html lang="en">

<head>
    <title>emcJS sandbox</title>
    <meta charset="UTF-8">
    <meta name="description" content="Test for emcJS components">
    <meta name="robots" content="none">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#000000">
    <style>
        :root {
            font-family: Arial, Helvetica, sans-serif;
            font-size: 16px;
        }

        * {
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            margin: 0px;
            padding: 0px;
            width: 100vw;
            height: 100vh;
        }

        emc-form-container {
            height: 100%;
        }

        .form-wrapper {
            display: flex;
            width: 100%;
            height: 100%;

            #form-section-navigation {
                flex-shrink: 0;
                width: 500px;
            }

            #form {
                flex-shrink: 0;
                flex-grow: 1;
            }
        }
    </style>
    <script type="module" src="./index.js"></script>
</head>

<body style="display: flex; flex-direction: column;">
    <emc-page id="page" style="padding: 8px;">
        <div class="form-wrapper">
            <emc-tree id="form-section-navigation"></emc-tree>
            <emc-form-container id="form">
                <form slot="header"></form>
                <form>
                    <emc-form-section label="Test 1">
                        <emc-input-action id="action" name="action" label="action" placeholder="A whole lot of nothing" description="Test description" control-buttons="copy reset" required></emc-input-action>
                        <emc-input-boolorlogic name="boolorlogic" label="boolorlogic" control-buttons="reset" required></emc-input-boolorlogic>
                        <emc-input-color name="color" label="color" placeholder="Enter color..." control-buttons="reset" required></emc-input-color>
                        <emc-input-keybind name="keybind" label="keybind" placeholder="Enter key binding..." control-buttons="reset" required></emc-input-keybind>
                        <emc-form-section label="Test 1.1">
                            <emc-input-list name="list" label="list" control-buttons="reset" required></emc-input-list>
                            <emc-input-logic name="logic" label="logic" control-buttons="reset" required></emc-input-logic>
                            <emc-form-section label="Test 1.1.1">
                                <emc-form-section label="Test 1.1.1.1">
                                    <emc-form-section label="Test 1.1.1.1.1">
                                        <emc-form-section label="Test 1.1.1.1.1.1">
                                            <emc-input-number name="number" label="number" placeholder="Enter number..." control-buttons="reset" required spinner></emc-input-number>
                                            <emc-input-password name="password" label="password" placeholder="Enter password..." control-buttons="reset" required></emc-input-password>
                                        </emc-form-section>
                                    </emc-form-section>
                                </emc-form-section>
                            </emc-form-section>
                        </emc-form-section>
                    </emc-form-section>
                </form>
                <form>
                    <emc-form-section label="Test 2">
                        <emc-input-range name="range" label="range" control-buttons="reset" required></emc-input-range>
                        <emc-input-search name="search" label="search" placeholder="Enter search..." control-buttons="reset" required></emc-input-search>
                        <emc-input-string name="string-min" label="string min" placeholder="Enter text..." control-buttons="reset" required minlength="10" showtextlength></emc-input-string>
                        <emc-input-string name="string" label="string" placeholder="Enter text..." control-buttons="reset" required minlength="10" maxlength="20" showtextlength></emc-input-string>
                        <emc-input-switch name="switch" label="switch" control-buttons="reset" required></emc-input-switch>
                        <emc-input-text name="text" label="text" placeholder="Enter text..." control-buttons="reset" required maxlength="100" showtextlength></emc-input-text>
                    </emc-form-section>
                </form>
                <form>
                    <emc-select-image name="image-select" label="image-select" placeholder="Select image..." control-buttons="reset" required></emc-select-image>
                </form>
                <form slot="footer">
                    <input type="hidden" name="test" value="foobar">
                    <emc-form-row align="end">
                        <emc-button-error id="error-button" visible="true" enabled="true" distance="right"></emc-button-error>
                        <emc-button-reset visible="true" enabled="true"></emc-button-reset>
                        <emc-button-submit visible="true" enabled="true"></emc-button-submit>
                    </emc-form-row>
                </form>
            </emc-form-container>
            </emc-panel-hbox>
    </emc-page>
</body>

</html>
