<!DOCTYPE html>
<html lang="en">

<head>
    <title>emcJS sandbox</title>
    <base>
    <meta charset="UTF-8">
    <meta name="description" content="Test for emcJS components">
    <meta name="robots" content="none">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#000000">
    <script type="module" src="./index.js"></script>
    <style>
        #icon-container {
            width: 200px;
            height: 200px;
            resize: both;
            background-color: rgb(87, 54, 177);
            overflow: hidden;
        }

        #icon {
            width: 100%;
            height: 100%;
            color: white;
        }

        .test {
            width: 20px;
            height: 20px;
            background-color: red;
            ;
        }

        .test:nth-child(1 of .active) {
            background-color: green;
        }

        .test:nth-last-child(1 of .active) {
            background-color: blue;
        }
    </style>
</head>

<body>
    Home
    <div id="icon-container">
        <emc-font-icon id="icon" icon="add"></emc-font-icon>
    </div>
    <div>
        <div class="test"></div>
        <div class="test active"></div>
        <div class="test active"></div>
        <div class="test active"></div>
        <div class="test"></div>
    </div>
</body>

</html>
