<!DOCTYPE html>
<html lang="en">

<head>
    <title>emcJS sandbox</title>
    <base>
    <meta charset="UTF-8">
    <meta name="description" content="Test for emcJS components">
    <meta name="robots" content="none">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#000000">
    <link rel="stylesheet" href="/emcJS/_style/fonts.css">
    <script type="module" src="./index.js"></script>
    <style>
        #icon-container {
            width: 200px;
            height: 200px;
            resize: both;
            background-color: rgb(87, 54, 177);
            overflow: hidden;
        }

        #icon {
            width: 100%;
            height: 100%;
            color: white;
        }

        .test {
            width: 20px;
            height: 20px;
            background-color: red;
            ;
        }

        .test:nth-child(1 of .active) {
            background-color: green;
        }

        .test:nth-last-child(1 of .active) {
            background-color: blue;
        }
    </style>
</head>

<body>
    <emc-page id="page" style="padding: 8px;">
        <div id="icon-container">
            <emc-font-icon id="icon" icon="add"></emc-font-icon>
        </div>
        <div>
            <div class="test"></div>
            <div class="test active"></div>
            <div class="test active"></div>
            <div class="test active"></div>
            <div class="test"></div>
        </div>
        <emc-input-checkbox></emc-input-checkbox>
        <emc-input-switch></emc-input-switch>
        <emc-form-field label="test" description="blablabla" control-buttons="reset copy">
            <emc-input-string placeholder="foobar" required></emc-input-string>
        </emc-form-field>
        <emc-form-group>
            <emc-button variant="label" icon="€"></emc-button>
            <emc-input-number style="text-align: right;"></emc-input-number>
            <emc-button variant="label" icon=".00"></emc-button>
        </emc-form-group>
        <emc-progressbar value="50" animated></emc-progressbar>
    </emc-page>
</body>

</html>
