<div id="search">
    <input is="emc-i18n-input" id="search-input" i18n-placeholder="Search..." autocomplete="off">
    <emc-i18n-tooltip i18n-tooltip="Reset search">
        <div class="button-wrapper">
            <button id="search-reset">↺</button>
        </div>
    </emc-i18n-tooltip>
</div>
<emc-button id="cancel" text="cancel" tooltip="cancel"></emc-button>
<emc-button id="submit" text="submit" tooltip="submit"></emc-button>
