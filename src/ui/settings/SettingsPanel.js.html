<div id="focus_catcher_top"></div>
<div class="panel">
    <div class="title">
        <emc-i18n-label id="title-text"></emc-i18n-label>
    </div>
    <div class="header">
        <emc-navbar-hamburger id="hamburger-button" tabindex="0"></emc-navbar-hamburger>
        <emc-input-search id="search" nohover novalidate hideerrors></emc-input-search>
    </div>
    <div class="form-wrapper">
        <emc-tree id="form-section-navigation"></emc-tree>
        <emc-form-container id="form-container">
            <form id="settings-form"></form>
        </emc-form-container>
    </div>
    <form id="footer-form">
        <emc-form-row align="end">
            <emc-button-error id="error-button" visible="true" enabled="true" distance="right"></emc-button-error>
            <emc-button id="cancel" visible="true" enabled="true" text="Cancel" icon="✕"></emc-button>
            <emc-button-submit id="submit" visible="true" enabled="true"></emc-button-submit>
        </emc-form-row>
    </form>
</div>
<div id="focus_catcher_bottom"></div>
