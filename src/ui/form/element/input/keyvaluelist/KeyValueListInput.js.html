<div class="header">
    <emc-input-search id="search"></emc-input-search>
</div>
<emc-datagrid id="grid" nohead stretched="value">
    <emc-datagrid-column name="name" caption="Key" type="string" width="200"></emc-datagrid-column>
    <emc-datagrid-column name="value" caption="Value" type="string" width="300" editable action="value"></emc-datagrid-column>
    <emc-datagrid-column name="delete" caption="Delete" type="button" width="100" text="Delete" action="delete"></emc-datagrid-column>
</emc-datagrid>
<emc-form-row class="footer" align="end">
    <emc-button id="add" text="Add entry" icon="+"></emc-button>
</emc-form-row>
