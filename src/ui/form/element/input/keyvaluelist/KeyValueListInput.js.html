<div class="header">
    <emc-input-search id="search"></emc-input-search>
</div>
<emc-grid-datagrid id="grid" nohead>
    <emc-grid-column name="name" label="Key" type="string" width="200"></emc-grid-column>
    <emc-grid-column name="value" label="Value" type="string" width="100%" editable action="editValue"></emc-grid-column>
    <emc-grid-column name="delete" label="Delete" type="button" width="100" text="Delete" action="delete"></emc-grid-column>
</emc-grid-datagrid>
<emc-form-row class="footer" align="end">
    <emc-button id="add" text="Add entry" icon="+"></emc-button>
</emc-form-row>
