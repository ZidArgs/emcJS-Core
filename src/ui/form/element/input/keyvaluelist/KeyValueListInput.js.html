<div class="header">
    <emc-input-search id="search"></emc-input-search>
</div>
<emc-grid-datagrid id="grid" nohead stretched="value">
    <emc-grid-column name="name" caption="Key" type="string" width="200"></emc-grid-column>
    <emc-grid-column name="value" caption="Value" type="string" width="300" editable action="value"></emc-grid-column>
    <emc-grid-column name="delete" caption="Delete" type="button" width="100" text="Delete" action="delete"></emc-grid-column>
</emc-grid-datagrid>
<emc-form-row class="footer" align="end">
    <emc-button id="add" text="Add entry" icon="+"></emc-button>
</emc-form-row>
