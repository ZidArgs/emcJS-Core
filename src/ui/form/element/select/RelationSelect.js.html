<input is="emc-i18n-input" id="input" i18n-placeholder="Search..." autocomplete="off" name="internal_search">
<div id="view" mode="view">
    <emc-i18n-label id="placeholder"></emc-i18n-label>
    <div id="value">
        <emc-i18n-label id="name"></emc-i18n-label>
        <emc-i18n-label id="type"></emc-i18n-label>
    </div>
</div>
<div id="button"></div>
<div id="scroll-container">
    <slot id="options-container">
        <div id="empty">no entries</div>
    </slot>
</div>
