<emc-i18n-tooltip id="tooltip">
    <label id="label" for="input">
        <emc-i18n-label id="label-text"></emc-i18n-label>
    </label>
    <emc-i18n-textbox id="description"></emc-i18n-textbox>
    <div id="field-container">
        <div id="field"></div>
        <emc-button id="copy" icon-type="font" icon="copy" tooltip="Copy" tabindex="-1"></emc-button>
        <emc-button id="reset" icon="↺" tooltip="Reset" class="rotate-icon-270 inactive" tabindex="-1"></emc-button>
    </div>
    <emc-i18n-textbox id="error" aria-live="polite"></emc-i18n-textbox>
</emc-i18n-tooltip>
